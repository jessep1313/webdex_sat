{% extends 'base.html' %}
{% block title %}{% if sucursal %}Editar{% else %}Nueva{% endif %} Sucursal{% endblock %}
{% block content_title %}{% if sucursal %}Editar{% else %}Nueva{% endif %} Sucursal{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title">Datos de la sucursal</h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" name="nombre" id="nombre" class="form-control" value="{{ sucursal.nombre|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label for="codigo" class="form-label">Código</label>
                <input type="text" name="codigo" id="codigo" class="form-control" value="{{ sucursal.codigo|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label for="empresa" class="form-label">Empresa</label>
                <select name="empresa" id="empresa" class="form-select" required>
                    <option value="">Seleccione una empresa</option>
                    {% for empresa in empresas %}
                    <option value="{{ empresa.id }}" {% if sucursal.empresa.id == empresa.id %}selected{% endif %}>{{ empresa.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="activo" id="activo" class="form-check-input" {% if sucursal.activo %}checked{% endif %}>
                <label for="activo" class="form-check-label">Activo</label>
            </div>
            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{% url 'sucursales_lista' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
