{% extends 'base.html' %}
{% block title %}{% if grupo %}Editar{% else %}Nuevo{% endif %} Grupo{% endblock %}
{% block content_title %}{% if grupo %}Editar{% else %}Nuevo{% endif %} Grupo{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title">Datos del grupo</h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" name="nombre" id="nombre" class="form-control" value="{{ grupo.nombre|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción</label>
                <textarea name="descripcion" id="descripcion" class="form-control" rows="3">{{ grupo.descripcion|default:'' }}</textarea>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="activo" id="activo" class="form-check-input" {% if grupo.activo %}checked{% endif %}>
                <label for="activo" class="form-check-label">Activo</label>
            </div>
            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{% url 'grupos_lista' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
